<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voice AI Assistant</title>
<style>
  :root {
    --bg: #0f1420; --panel: #171e2e; --panel2: #1d2639;
    --text: #e8edf5; --muted: #8b98ad; --accent: #4f8cff; --accent2: #7c5cff;
    --user: linear-gradient(135deg, #4f8cff, #7c5cff); --bot: #232e46;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); height: 100vh;
         display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 14px;
           padding: 16px 24px; background: var(--panel);
           border-bottom: 1px solid #232d44; }
  .logo { width: 40px; height: 40px; border-radius: 12px; flex: none;
          background: var(--user); display: grid; place-items: center; font-size: 20px; }
  h1 { font-size: 17px; margin: 0; }
  .subtitle { font-size: 12px; color: var(--muted); }
  .pill { margin-left: auto; font-size: 12px; padding: 5px 12px; border-radius: 999px;
          background: #1c2b1e; color: #7dd87d; border: 1px solid #2c4a2e; }
  .pill.live { background: #16233c; color: #6fa8ff; border-color: #274169; }
  #chat { flex: 1; overflow-y: auto; padding: 26px 12%; display: flex;
          flex-direction: column; gap: 14px; }
  .row { display: flex; }
  .msg { max-width: 72%; padding: 12px 16px; border-radius: 16px; line-height: 1.5;
         font-size: 14.5px; animation: pop .18s ease-out; white-space: pre-wrap; }
  @keyframes pop { from { transform: translateY(6px); opacity: 0; } }
  .user { margin-left: auto; background: var(--user); border-bottom-right-radius: 4px; }
  .bot  { background: var(--bot); border-bottom-left-radius: 4px; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex;
          align-items: center; gap: 8px; }
  .speak { cursor: pointer; opacity: .8; }
  .typing { display: inline-flex; gap: 4px; padding: 14px 18px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
                 animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,60%,100% { opacity: .25 } 30% { opacity: 1 } }
  footer { padding: 16px 12% 22px; background: linear-gradient(transparent, var(--bg) 40%); }
  .inputbar { display: flex; gap: 10px; background: var(--panel2); border-radius: 16px;
              padding: 10px 12px; border: 1px solid #26314d; }
  #box { flex: 1; background: none; border: none; outline: none; color: var(--text);
         font-size: 15px; }
  button { border: none; border-radius: 12px; cursor: pointer; font-size: 16px;
           width: 44px; height: 40px; display: grid; place-items: center; color: white; }
  #send { background: var(--user); }
  #mic  { background: #2a3552; }
  #mic.rec { background: #c0392b; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { transform: scale(1.08); } }
  .hint { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>
<header>
  <div class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></div>
  <div>
    <h1>Voice AI Assistant</h1>
    <div class="subtitle">FastAPI · WebSocket · STT → RAG + LLM → neural TTS</div>
  </div>
  <div class="pill" id="mode">…</div>
</header>

<div id="chat"></div>

<footer>
  <div class="inputbar">
    <input id="box" placeholder="Type a message, or hold the mic to speak…" autocomplete="off">
    <button id="mic" title="Hold to talk (live mode)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></button>
    <button id="send" title="Send"><svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <div class="hint" id="hint"></div>
</footer>

<script>
const chat = document.getElementById("chat");
const box = document.getElementById("box");
const modePill = document.getElementById("mode");
const hint = document.getElementById("hint");
let sessionId = crypto.randomUUID();
let demo = true;

fetch("/health").then(r => r.json()).then(h => {
  demo = h.mode !== "live";
  modePill.textContent = demo ? "● demo mode - fully local" : "● live - Azure";
  modePill.classList.toggle("live", !demo);
  hint.textContent = demo
    ? "Demo mode: rule-based assistant + local neural TTS (Piper). No cloud calls. Mic needs live mode."
    : "Live mode: Azure Speech STT/TTS + GPT-4o with RAG.";
  addBot("Hi! Ask me about this system's architecture, latency budget, RAG grounding, or tech stack." +
         (demo ? " (I'm running fully offline right now.)" : ""));
});

function addRow(cls, html) {
  const row = document.createElement("div"); row.className = "row";
  const div = document.createElement("div"); div.className = "msg " + cls;
  div.innerHTML = html; row.appendChild(div); chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight; return div;
}
const addUser = t => addRow("user", esc(t));
function addBot(t, meta) {
  const div = addRow("bot", esc(t));
  if (meta) { const m = document.createElement("div"); m.className = "meta"; m.innerHTML = meta; div.appendChild(m); }
  return div;
}
const esc = t => t.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

let typingRow = null;
function showTyping() {
  typingRow = addRow("bot typing", "<span></span><span></span><span></span>");
}
function hideTyping() { if (typingRow) { typingRow.parentElement.remove(); typingRow = null; } }

async function send() {
  const text = box.value.trim(); if (!text) return;
  box.value = ""; addUser(text); showTyping();
  const t0 = performance.now();
  try {
    const chatRes = await fetch("/chat", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: text, session_id: sessionId }) }).then(r => r.json());
    const tChat = performance.now();
    const speakRes = await fetch("/speak", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text: chatRes.response }) }).then(r => r.json());
    const tAll = performance.now();
    hideTyping();
    const meta = `chat ${(tChat - t0).toFixed(0)} ms · voice ${(tAll - tChat).toFixed(0)} ms` +
                 ` · <span class="speak" title="Replay audio">&#9654; replay</span>`;
    const div = addBot(chatRes.response, meta);
    const audio = new Audio("data:audio/wav;base64," + speakRes.audio_data);
    audio.play().catch(() => {});
    div.querySelector(".speak").onclick = () => audio.play();
  } catch (e) { hideTyping(); addBot("Error: " + e.message); }
}
document.getElementById("send").onclick = send;
box.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

// --- mic: PCM capture -> /converse (live mode) ---------------------------
const micBtn = document.getElementById("mic");
let mediaStream, audioCtx, processor, chunks = [];
micBtn.addEventListener("mousedown", startRec);
micBtn.addEventListener("mouseup", stopRec);
async function startRec() {
  if (demo) { hint.textContent = "Mic streaming needs live Azure mode - use the text box in this demo."; return; }
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
  audioCtx = new AudioContext({ sampleRate: 16000 });
  const src = audioCtx.createMediaStreamSource(mediaStream);
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  chunks = [];
  processor.onaudioprocess = e => {
    const f32 = e.inputBuffer.getChannelData(0);
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) i16[i] = Math.max(-1, Math.min(1, f32[i])) * 32767;
    chunks.push(i16);
  };
  src.connect(processor); processor.connect(audioCtx.destination);
  micBtn.classList.add("rec");
}
async function stopRec() {
  if (!mediaStream) return;
  micBtn.classList.remove("rec");
  processor.disconnect(); mediaStream.getTracks().forEach(t => t.stop()); audioCtx.close();
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const pcm = new Int16Array(total); let off = 0;
  chunks.forEach(c => { pcm.set(c, off); off += c.length; });
  const b64 = btoa(String.fromCharCode(...new Uint8Array(pcm.buffer)));
  showTyping();
  const res = await fetch("/converse", { method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ audio_data: b64, session_id: sessionId }) }).then(r => r.json());
  hideTyping();
  addUser(res.transcription || "(no speech detected)");
  const lat = res.latency_seconds;
  const meta = lat ? `stt ${(lat.stt*1000).toFixed(0)} ms · chat ${(lat.chat*1000).toFixed(0)} ms · voice ${(lat.tts*1000).toFixed(0)} ms` : "";
  addBot(res.response, meta);
  new Audio("data:audio/wav;base64," + res.audio_data).play().catch(() => {});
  mediaStream = null;
}
</script>
</body>
</html>
